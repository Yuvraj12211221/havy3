version: "3.1"

rules:
- rule: Always try FAQ first
  steps:
    - action: action_lookup_faq

- rule: Answer FAQ using action
  steps:
    - intent: ask_faq
    - action: action_lookup_faq

- rule: Try FAQ on fallback
  steps:
    - intent: nlu_fallback
    - action: action_lookup_faq

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Provide help when asked
  steps:
  - intent: help
  - action: utter_help

- rule: Respond to thank you
  steps:
  - intent: thank_you
  - action: utter_thank_you

- rule: Handle out of scope requests
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope
